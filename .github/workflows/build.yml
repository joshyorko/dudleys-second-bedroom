---
name: Build container image
on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '00 21 * * *'  # 9:00pm UTC everyday (5:00pm EDT / 4:00pm EST)
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
      - '**/logo.png'
      - 'specs/**'
      - '.github/**'
      - '.specify/**'
  workflow_dispatch:
    inputs:
      base_image:
        description: 'Base image to build from (default: ghcr.io/ublue-os/bluefin-dx:stable)'
        required: false
        type: string
      image_tag:
        description: 'Primary publish tag override. Leave blank to auto-use latest for the default base, nvidia for Nvidia bases, or a sanitized variant name for other custom bases.'
        required: false
        type: string
      build_iso:
        description: 'Also build the installer ISO after the container image publishes.'
        required: false
        default: false
        type: boolean

env:
  IMAGE_DESC: "My Customized Universal Blue Image"
  IMAGE_KEYWORDS: "bootc,ublue,universal-blue"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/120078124?s=200&v=4"  # Put your own image here for a fancy profile on https://artifacthub.io/!
  IMAGE_NAME: "${{ github.event.repository.name }}"  # output image name, usually same as repo name
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"  # do not edit
  DEFAULT_TAG: "latest"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  pre-build-validation:
    name: Pre-build validation
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Just
        uses: ./.github/actions/setup-just

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq shellcheck shfmt

      - name: Run all validation checks
        run: just check

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Just
        uses: ./.github/actions/setup-just

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Run unit tests
        run: just test-unit

  build_push:
    name: Build and push image
    runs-on: ubuntu-24.04
    needs: [pre-build-validation, unit-tests]
    # Only build on push to main, schedule, or manual dispatch - skip PRs to save CI time
    if: github.event_name != 'pull_request'
    outputs:
      tags: ${{ steps.metadata.outputs.tags }}
      build_date: ${{ steps.date.outputs.date }}
      digest: ${{ steps.push.outputs.digest }}
      digest_ref: ${{ steps.push.outputs.digest_ref }}
      primary_tag: ${{ steps.resolve-build-config.outputs.primary_tag }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Prepare environment
        run: |
          # Lowercase the image uri
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      # These stage versions are pinned by https://github.com/renovatebot/renovate
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Keep this disabled for now.
      # It was mainly helpful when we needed extra runner headroom for very large image/rechunk-style flows.
      # Re-enable it if we turn rechunking back on or start hitting GitHub runner disk pressure again.
      # - name: Maximize build space
      #   uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9
      #   with:
      #     remove-dotnet: 'true'
      #     remove-android: 'true'
      #     remove-haskell: 'true'
      #     remove-codeql: 'true'

      - name: Mount BTRFS for podman storage
        id: container-storage-action
        uses: ublue-os/container-storage-action@dc1f4c8f17b672069e921f001132f7cf98a423a6
        # Fallback to an explicit runner cleanup step if GitHub doesn't allocate enough space
        # See: https://github.com/ublue-os/container-storage-action/pull/11
        continue-on-error: true
        with:
          target-dir: /var/lib/containers
          mount-opts: compress-force=zstd:2

      - name: Get current date
        id: date
        run: |
          # This generates a timestamp like what is defined on the ArtifactHub documentation
          # E.G: 2022-02-08T15:38:15Z'
          # https://artifacthub.io/docs/topics/repositories/container-images/
          # https://linux.die.net/man/1/date
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      # Pre-pull base image with retry to handle transient network failures
      - name: Pre-pull base image
        id: pre-pull-base-image
        run: |
          set -euo pipefail
          BASE_IMAGE="${{ inputs.base_image || 'ghcr.io/ublue-os/bluefin-dx:stable' }}"
          MAX_ATTEMPTS=3
          RETRY_DELAY=30
          echo "Pre-pulling base image: $BASE_IMAGE"
          for attempt in $(seq 1 "${MAX_ATTEMPTS}"); do
            if podman pull "$BASE_IMAGE"; then
              echo "Successfully pulled base image on attempt ${attempt}"
              break
            fi
            if [[ "${attempt}" -eq "${MAX_ATTEMPTS}" ]]; then
              echo "ERROR: Failed to pull base image after ${MAX_ATTEMPTS} attempts" >&2
              exit 1
            fi
            echo "Pull attempt ${attempt} failed, retrying in ${RETRY_DELAY}s..."
            sleep "${RETRY_DELAY}"
          done

      - name: Resolve build config
        id: resolve-build-config
        run: |
          set -euo pipefail

          DEFAULT_BASE_IMAGE='ghcr.io/ublue-os/bluefin-dx:stable'
          BASE_IMAGE_INPUT="${{ inputs.base_image }}"
          IMAGE_TAG_INPUT="${{ inputs.image_tag }}"

          sanitize_tag() {
            local value="$1"
            value="${value,,}"
            value="$(printf '%s' "${value}" | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//')"
            printf '%s' "${value}"
          }

          if [[ -n "${BASE_IMAGE_INPUT}" ]]; then
            BASE_IMAGE="${BASE_IMAGE_INPUT}"
          else
            BASE_IMAGE="${DEFAULT_BASE_IMAGE}"
          fi

          BASE_ID="$(podman run --rm "${BASE_IMAGE}" bash -lc '. /etc/os-release && printf "%s" "${ID}"')"
          BASE_VERSION_ID="$(podman run --rm "${BASE_IMAGE}" bash -lc '. /etc/os-release && printf "%s" "${VERSION_ID}"')"
          BASE_VARIANT_ID="$(podman run --rm "${BASE_IMAGE}" bash -lc '. /etc/os-release && printf "%s" "${VARIANT_ID:-}"')"

          if [[ -n "${IMAGE_TAG_INPUT}" ]]; then
            PRIMARY_TAG="$(sanitize_tag "${IMAGE_TAG_INPUT}")"
          elif [[ "${BASE_IMAGE}" == "${DEFAULT_BASE_IMAGE}" ]]; then
            PRIMARY_TAG="${DEFAULT_TAG}"
          elif [[ "${BASE_IMAGE}" == *nvidia* ]] || [[ "${BASE_VARIANT_ID}" == *nvidia* ]]; then
            PRIMARY_TAG="nvidia"
          elif [[ -n "${BASE_VARIANT_ID}" ]]; then
            PRIMARY_TAG="$(sanitize_tag "${BASE_VARIANT_ID}")"
          else
            PRIMARY_TAG="$(sanitize_tag "$(basename "${BASE_IMAGE%%:*}")")"
          fi

          if [[ -z "${PRIMARY_TAG}" ]]; then
            echo "ERROR: Could not determine a primary tag for base image ${BASE_IMAGE}" >&2
            exit 1
          fi

          if [[ "${PRIMARY_TAG}" == "${DEFAULT_TAG}" ]]; then
            METADATA_TAGS=$'type=raw,value='"${PRIMARY_TAG}"$'\n''type=raw,value='"${PRIMARY_TAG}"'.{{date '\''YYYYMMDD'\''}}'$'\n''type=raw,value={{date '\''YYYYMMDD'\''}}'
          else
            METADATA_TAGS=$'type=raw,value='"${PRIMARY_TAG}"$'\n''type=raw,value='"${PRIMARY_TAG}"'.{{date '\''YYYYMMDD'\''}}'$'\n''type=raw,value='"${PRIMARY_TAG}"'-{{date '\''YYYYMMDD'\''}}'
          fi

          {
            echo "resolved_base_image=${BASE_IMAGE}"
            echo "expected_os_id=${BASE_ID}"
            echo "expected_version_id=${BASE_VERSION_ID}"
            echo "expected_variant_id=${BASE_VARIANT_ID}"
            echo "primary_tag=${PRIMARY_TAG}"
            echo "metadata_tags<<EOF"
            printf '%s\n' "${METADATA_TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "Resolved base image: ${BASE_IMAGE}"
            echo "Resolved base OS: ${BASE_ID} ${BASE_VERSION_ID}"
            if [[ -n "${BASE_VARIANT_ID}" ]]; then
              echo "Resolved base variant: ${BASE_VARIANT_ID}"
            fi
            echo "Primary publish tag: ${PRIMARY_TAG}"
          } >> "$GITHUB_STEP_SUMMARY"

      # Image metadata for https://artifacthub.io/ - This is optional but is highly recommended so we all can get an index of all the custom images
      # The metadata by itself is not going to do anything, you choose if you want your image to be on ArtifactHub or not.
      - name: Image Metadata
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        id: metadata
        with:
          tags: ${{ steps.resolve-build-config.outputs.metadata_tags }}
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/blob/${{ github.sha }}/Containerfile
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/tree/${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ steps.resolve-build-config.outputs.primary_tag }}.{{date 'YYYYMMDD'}}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=${{ env.IMAGE_LOGO_URL }}
            io.artifacthub.package.prerelease=false
            containers.bootc=1
          sep-tags: " "
          sep-annotations: " "

      - name: Build Image
        id: build_image
        run: |
          set -euo pipefail
          IMAGE_REF="localhost/${IMAGE_NAME}:${{ steps.resolve-build-config.outputs.primary_tag }}"
          MAX_ATTEMPTS=3
          RETRY_DELAY=30
          declare -a build_args=(
            --file ./Containerfile
            --format docker
            --layers
            --tag "${IMAGE_REF}"
            --build-arg "IMAGE_NAME=${IMAGE_NAME}"
            --build-arg "IMAGE_TAG=${{ steps.resolve-build-config.outputs.primary_tag }}"
            --build-arg "IMAGE_REF=${{ env.IMAGE_REGISTRY }}/${IMAGE_NAME}:${{ steps.resolve-build-config.outputs.primary_tag }}"
            --build-arg "SHA_HEAD_SHORT=${GITHUB_SHA}"
            --build-arg "VSCODE_REFRESH_TOKEN=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          )

          build_args+=(--build-arg "BASE_IMAGE=${{ steps.resolve-build-config.outputs.resolved_base_image }}")

          while IFS= read -r label; do
            [[ -n "${label}" ]] || continue
            build_args+=(--label "${label}")
          done <<< "${{ steps.metadata.outputs.labels }}"

          echo "Building ${IMAGE_REF}"
          for attempt in $(seq 1 "${MAX_ATTEMPTS}"); do
            if podman build "${build_args[@]}" .; then
              echo "Build succeeded on attempt ${attempt}"
              break
            fi
            if [[ "${attempt}" -eq "${MAX_ATTEMPTS}" ]]; then
              echo "ERROR: Image build failed after ${MAX_ATTEMPTS} attempts" >&2
              exit 1
            fi
            echo "Build attempt ${attempt} failed, retrying in ${RETRY_DELAY}s..."
            sleep "${RETRY_DELAY}"
          done

      - name: Install Just
        uses: ./.github/actions/setup-just

      - name: Verify built image
        run: |
          # Install dependencies for verification
          sudo apt-get update
          sudo apt-get install -y jq

          # Run verification using just command
          EXPECTED_OS_ID="${{ steps.resolve-build-config.outputs.expected_os_id }}" \
          EXPECTED_VERSION_ID="${{ steps.resolve-build-config.outputs.expected_version_id }}" \
          EXPECTED_VARIANT_ID="${{ steps.resolve-build-config.outputs.expected_variant_id }}" \
          just verify-build "localhost/${{ env.IMAGE_NAME }}" "${{ steps.resolve-build-config.outputs.primary_tag }}"

      # Rechunk is a script that we use on Universal Blue to make sure there isnt a single huge layer when your image gets published.
      # This does not make your image faster to download, just provides better resumability and fixes a few errors.
      # Documentation for Rechunk is provided on their github repository at https://github.com/hhd-dev/rechunk
      # You can enable it by uncommenting the following lines:
      # - name: Copy image to root storage for rechunking
      #   run: |
      #     # Save image from user storage to tarball
      #     # Use workspace to avoid /tmp size limits
      #     podman save -o image.tar "localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}"
      #     # Load image into root storage
      #     sudo podman load -i image.tar
      #     # Cleanup
      #     rm image.tar
      #
      # - name: Run Rechunker
      #   id: rechunk
      #   uses: hhd-dev/rechunk@5fbe1d3a639615d2548d83bc888360de6267b1a2 # v1.2.4
      #   with:
      #     rechunk: 'ghcr.io/hhd-dev/rechunk:v1.0.1'
      #     ref: "localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}"
      #     prev-ref: "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}"
      #     skip_compression: true
      #     labels: ${{ steps.metadata.outputs.labels }}
      #
      # # Load the rechunked image back into podman storage
      # - name: Load rechunked image in podman and tag
      #   run: |
      #     IMAGE=$(podman pull ${{ steps.rechunk.outputs.ref }})
      #     sudo rm -rf ${{ steps.rechunk.outputs.output }}
      #     for tag in ${{ steps.metadata.outputs.tags }}; do
      #       podman tag $IMAGE ${{ env.IMAGE_NAME }}:$tag
      #     done

      # Tag the built image with all metadata tags (without rechunking)
      - name: Tag image with all metadata tags
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [[ -n "${tag}" ]] || continue
            if [[ "${tag}" == "${{ steps.resolve-build-config.outputs.primary_tag }}" ]]; then
              continue
            fi
            podman tag "localhost/${{ env.IMAGE_NAME }}:${{ steps.resolve-build-config.outputs.primary_tag }}" "localhost/${{ env.IMAGE_NAME }}:$tag"
          done < <(printf '%s\n' "${{ steps.metadata.outputs.tags }}" | tr ' ' '\n')

      # These `if` statements are so that pull requests for your custom images do not make it publish any packages under your name without you knowing
      # They also check if the runner is on the default branch so that things like the merge queue (if you enable it), are going to work
      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "${GHCR_TOKEN}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin
          printf '%s' "${GHCR_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push To GHCR
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        id: push
        timeout-minutes: 60
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [[ -n "${tag}" ]] || continue
            podman push "localhost/${{ env.IMAGE_NAME }}:$tag" "docker://${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:$tag"
          done < <(printf '%s\n' "${{ steps.metadata.outputs.tags }}" | tr ' ' '\n')
          DIGEST=$(skopeo inspect --format '{{.Digest}}' "docker://${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.resolve-build-config.outputs.primary_tag }}")
          if [[ -z "${DIGEST}" ]]; then
            echo "ERROR: Failed to extract pushed image digest" >&2
            exit 1
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "digest_ref=${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}" >> "$GITHUB_OUTPUT"

  build_installer_iso:
    name: Build installer ISO
    needs: [build_push]
    if: github.event_name == 'workflow_dispatch' && inputs.build_iso

    permissions:
      contents: read
      packages: read
      id-token: write

    uses: ./.github/workflows/reusable-build-iso.yml
    with:
      image_tag: ${{ needs.build_push.outputs.primary_tag }}
      checkout_ref: ${{ github.sha }}
      upload_artifacts: true
    secrets: inherit

  # ============================================
  # SUPPLY CHAIN SECURITY JOB
  # ============================================
  # This job runs on a fresh runner after the image is pushed.
  # It pulls the image from the registry (faster than copying blobs)
  # and performs all supply chain security operations:
  # - SBOM generation and attestation
  # - SLSA provenance attestation
  # - Key-based and keyless signing
  # - Build metadata artifact upload
  supply_chain_security:
    name: Supply chain security
    runs-on: ubuntu-24.04
    needs: [build_push]
    if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          # Lowercase the image uri
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Login to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "${GHCR_TOKEN}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin
          printf '%s' "${GHCR_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          DIGEST="${{ needs.build_push.outputs.digest }}"
          if [[ -z "${DIGEST}" ]]; then
            echo "ERROR: Missing pushed image digest from build job" >&2
            exit 1
          fi
          IMAGE_DIGEST_REF="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"
          echo "IMAGE_DIGEST=${DIGEST}" >> "$GITHUB_ENV"
          echo "IMAGE_DIGEST_REF=${IMAGE_DIGEST_REF}" >> "$GITHUB_ENV"

      # ----------------------------------------
      # Install supply chain tools
      # ----------------------------------------
      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Install ORAS
        run: |
          set -euo pipefail
          echo "Installing oras"
          ORAS_VERSION="1.3.2"
          curl -LO "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz"
          tar -xzf "oras_${ORAS_VERSION}_linux_amd64.tar.gz" -C /usr/local/bin oras
          rm -f "oras_${ORAS_VERSION}_linux_amd64.tar.gz"
          echo "Installed versions:"
          cosign version
          oras version

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6

      - name: Verify Trivy installation
        run: trivy version

      # ----------------------------------------
      # Generate SBOM (Software Bill of Materials)
      # Uses trivy which handles large images more efficiently than syft
      # ----------------------------------------
      - name: Generate SBOM (SPDX JSON)
        id: gen-sbom
        timeout-minutes: 45
        run: |
          set -euo pipefail
          PRIMARY_TAG="${{ needs.build_push.outputs.primary_tag }}"

          echo "=== Disk space before SBOM generation ==="
          df -h / /tmp 2>/dev/null || df -h

          IMAGE_REF="${IMAGE_DIGEST_REF:-${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${PRIMARY_TAG}}"
          echo "Generating SPDX JSON SBOM for: $IMAGE_REF"
          echo "Using trivy with registry scanning (handles large images efficiently)"

          # Generate SBOM directly from registry using trivy
          # Trivy handles large images better than syft by streaming layers
          trivy image --format spdx-json --output "./sbom-${PRIMARY_TAG}.spdx.json" "$IMAGE_REF"

          echo "=== SBOM generation complete ==="
          echo "SBOM file: ./sbom-${PRIMARY_TAG}.spdx.json"
          echo "SBOM size: $(du -h "./sbom-${PRIMARY_TAG}.spdx.json" | cut -f1)"
          echo "SBOM lines: $(wc -l < "./sbom-${PRIMARY_TAG}.spdx.json")"

      # ----------------------------------------
      # Attest SBOM to image
      # ----------------------------------------
      - name: Attest SBOM to image with cosign
        run: |
          set -euo pipefail
          IMAGE_REF="${IMAGE_DIGEST_REF}"
          SBOM_FILE="./sbom-${{ needs.build_push.outputs.primary_tag }}.spdx.json"
          if [[ ! -f "$SBOM_FILE" ]]; then
            echo "SBOM file not found: $SBOM_FILE" >&2
            exit 1
          fi
          cosign attest -y \
            --predicate "$SBOM_FILE" \
            --type spdxjson \
            --key env://COSIGN_PRIVATE_KEY \
            "$IMAGE_REF"
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}

      # ----------------------------------------
      # Create and attest SLSA provenance
      # ----------------------------------------
      - name: Create SLSA provenance predicate
        id: create-predicate
        run: |
          set -euo pipefail
          mkdir -p .slsa
          cat > .slsa/predicate.json <<EOF
          {
            "builder": {"id": "gh-action/dudley-build"},
            "buildType": "https://github.com/joshyorko/dudleys-second-bedroom/build",
            "metadata": {
              "buildStartedOn": "${{ needs.build_push.outputs.build_date }}",
              "completeness": {"parameters": true, "environment": true, "materials": true},
              "reproducible": false
            },
            "invocation": {
              "configSource": {
                "uri": "git+https://github.com/${{ github.repository }}@refs/heads/${{ github.ref_name }}",
                "digest": {"sha1": "${{ github.sha }}"},
                "entryPoint": ".github/workflows/build.yml"
              }
            },
            "materials": [
              {
                "uri": "git+https://github.com/${{ github.repository }}",
                "digest": {"sha1": "${{ github.sha }}"}
              }
            ]
          }
          EOF

      - name: Attest image with SLSA provenance
        run: |
          set -euo pipefail
          cosign attest -y --key env://COSIGN_PRIVATE_KEY --type slsaprovenance --predicate .slsa/predicate.json "${IMAGE_DIGEST_REF}"
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}

      # ----------------------------------------
      # Key-based signing
      # ----------------------------------------
      - name: Sign container image (key-based)
        run: |
          cosign sign -y --key env://COSIGN_PRIVATE_KEY "${IMAGE_DIGEST_REF}"
        env:
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}

      # ----------------------------------------
      # Build metadata artifact (ORAS)
      # ----------------------------------------
      - name: Create metadata archive
        id: metadata-archive
        run: |
          set -euo pipefail
          echo "Creating metadata.tar.gz from available dirs: specs/, docs/, and build_files/"
          archive_inputs=()
          for directory in specs docs build_files; do
            if [[ -d "${directory}" ]]; then
              archive_inputs+=("${directory}")
            else
              echo "Skipping missing directory: ${directory}"
            fi
          done

          if [[ ${#archive_inputs[@]} -eq 0 ]]; then
            echo "No metadata directories found; creating an empty archive"
            tar -czf metadata.tar.gz --files-from /dev/null
          else
            tar -czvf metadata.tar.gz "${archive_inputs[@]}"
          fi

          ls -lh metadata.tar.gz

      - name: Extract image digest and construct metadata tag
        id: metadata-tag
        run: |
          set -euo pipefail
          DIGEST="${IMAGE_DIGEST:-${{ needs.build_push.outputs.digest }}}"
          DIGEST_NO_PREFIX="${DIGEST#sha256:}"
          METADATA_TAG="sha256-${DIGEST_NO_PREFIX}.metadata"
          echo "Image digest: ${DIGEST}"
          echo "Metadata tag: $METADATA_TAG"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "metadata_tag=$METADATA_TAG" >> "$GITHUB_OUTPUT"

      - name: Push metadata artifact with ORAS
        run: |
          set -euo pipefail
          METADATA_REF="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.metadata-tag.outputs.metadata_tag }}"
          echo "Pushing metadata artifact to $METADATA_REF"
          oras push "$METADATA_REF" \
            --artifact-type "application/vnd.dudley.metadata.v1" \
            metadata.tar.gz:application/gzip
          echo "Metadata artifact pushed successfully"

      # ----------------------------------------
      # Keyless (OIDC) signing
      # ----------------------------------------
      - name: Sign container image (keyless/OIDC)
        run: |
          set -euo pipefail
          echo "Performing keyless (OIDC) signing for image digest"
          cosign sign -y "${IMAGE_DIGEST_REF}"
        env:
          COSIGN_EXPERIMENTAL: "1"
